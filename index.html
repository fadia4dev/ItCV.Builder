const emptyExperience = () => ({
  id: crypto.randomUUID(),
  title: "",
  company: "",
  start: "",
  end: "",
  current: false,
  bullets: "",
});

const emptyEducation = () => ({ id: crypto.randomUUID(), degree: "", school: "", year: "", notes: "" });
const emptyProject = () => ({ id: crypto.randomUUID(), name: "", desc: "" });
const emptyCourse = () => ({ id: crypto.randomUUID(), name: "", org: "", year: "" });
const emptyCertification = () => ({ id: crypto.randomUUID(), name: "", org: "", number: "", year: "" });

function initialData() {
  return {
    status: "",
    fullName: "",
    jobTitle: "",
    phone: "",
    email: "",
    city: "",
    linkedin: "",
    summary: "",
    experiences: [emptyExperience()],
    education: [emptyEducation()],
    skills: "",
    languages: "",
    courses: [emptyCourse()],
    certifications: [emptyCertification()],
    projects: [emptyProject()],
    achievements: "",
    isBeneficiary: "",
    referralSource: "",
    referralOther: "",
  };
}

const isPhoneValid = (phone) => /^\d{10,}$/.test(phone || "");

// ---------- Google Sheet logging (optional) ----------
// استبدلي القيمة أدناه برابط تطبيق الويب (Apps Script) الخاص بك بعد نشره — راجعي التعليمات المرفقة.
// إن تُركت كما هي، لن يحاول التطبيق الإرسال، وستعمل الأداة بشكل طبيعي دون تسجيل أي بيانات.
const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyzhbqJoyHHb92RPNtexkuIquC4BMIl9XsEbru8GfdP-Tq9MxXYgktTCyMYPM07i_8h/exec";

function sendToSheet(data) {
  if (!SHEET_WEBHOOK_URL || SHEET_WEBHOOK_URL.indexOf("PASTE_") === 0) return;
  try {
    fetch(SHEET_WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        timestamp: new Date().toISOString(),
        fullName: data.fullName,
        phone: data.phone,
        email: data.email,
        city: data.city,
        status: data.status,
        jobTitle: data.jobTitle,
        specialization: (data.education && data.education[0] && data.education[0].degree) || "",
        isBeneficiary: data.isBeneficiary,
        referralSource: data.referralSource === "other" ? data.referralOther : data.referralSource,
      }),
    }).catch(function () {});
  } catch (e) {
    // لا يُوقف هذا أبدًا تحميل السيرة الذاتية للمستخدم، حتى لو فشل الإرسال
  }
}

// ---------- Small UI atoms ----------

function Field({ label, tip, children, required }) {
  return (
    <div className="mb-5">
      <label className="block text-sm font-semibold text-neutral-900 mb-1">
        {label} {required && <span className="text-neutral-400 font-normal">*</span>}
      </label>
      {children}
      {tip && <p className="mt-1 text-xs leading-relaxed text-neutral-500 whitespace-pre-line">{tip}</p>}
    </div>
  );
}

function TextInput({ lang, ...props }) {
  return (
    <input
      spellCheck={true}
      lang={lang}
      {...props}
      className="w-full border border-neutral-300 rounded-md px-3 py-2 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-neutral-800 focus:border-neutral-800 transition"
    />
  );
}

function TextArea({ lang, ...props }) {
  return (
    <textarea
      spellCheck={true}
      lang={lang}
      {...props}
      className="w-full border border-neutral-300 rounded-md px-3 py-2 text-sm text-neutral-900 focus:outline-none focus:ring-2 focus:ring-neutral-800 focus:border-neutral-800 transition resize-y"
    />
  );
}

function SectionCard({ title, subtitle, children }) {
  return (
    <div className="mb-8">
      <h2 className="text-lg font-bold text-neutral-900">{title}</h2>
      {subtitle && <p className="text-sm text-neutral-500 mb-4">{subtitle}</p>}
      {!subtitle && <div className="mb-4" />}
      {children}
    </div>
  );
}

function RemovableRow({ onRemove, children, canRemove }) {
  return (
    <div className="relative border border-neutral-200 rounded-lg p-4 mb-3 bg-neutral-50">
      {canRemove && (
        <button
          type="button"
          onClick={onRemove}
          aria-label="remove"
          className="absolute top-3 left-3 text-neutral-400 hover:text-red-600 text-xs font-semibold"
        >
          ✕
        </button>
      )}
      {children}
    </div>
  );
}

function AddButton({ onClick, label }) {
  return (
    <button
      type="button"
      onClick={onClick}
      className="text-sm font-semibold text-neutral-800 border border-neutral-300 rounded-md px-3 py-1.5 hover:bg-neutral-100 transition"
    >
      + {label}
    </button>
  );
}

// ---------- Steps ----------

function StepStatus({ data, setData, s, onNext }) {
  return (
    <div>
      <div className="bg-neutral-50 border border-neutral-200 rounded-lg p-3 mb-5">
        <p className="text-xs leading-relaxed text-neutral-600">{s.privacyNotice}</p>
      </div>
      <h2 className="text-xl font-bold text-neutral-900 mb-2">{s.statusHeading}</h2>
      <p className="text-sm text-neutral-500 mb-6">{s.statusSubtitle}</p>
      <div className="grid grid-cols-1 gap-3">
        {s.statuses.map((st) => (
          <button
            key={st.id}
            type="button"
            onClick={() => setData({ ...data, status: st.id })}
            className={`text-start border rounded-lg p-4 transition ${
              data.status === st.id ? "border-neutral-900 bg-neutral-900 text-white" : "border-neutral-300 hover:border-neutral-500"
            }`}
          >
            <div className="font-bold">{st.label}</div>
            <div className={`text-xs mt-1 ${data.status === st.id ? "text-neutral-300" : "text-neutral-500"}`}>{st.desc}</div>
          </button>
        ))}
      </div>
      <div className="mt-8 flex justify-end">
        <button
          disabled={!data.status}
          onClick={onNext}
          className="bg-neutral-900 text-white text-sm font-semibold px-5 py-2.5 rounded-md disabled:opacity-30 disabled:cursor-not-allowed hover:bg-neutral-700 transition"
        >
          {s.next}
        </button>
      </div>
    </div>
  );
}

function StepContact({ data, setData, s, lang }) {
  const phoneTouched = data.phone.length > 0;
  const phoneOk = isPhoneValid(data.phone);
  return (
    <SectionCard title={s.contactTitle}>
      <Field label={s.fullNameLabel} tip={s.fullNameTip} required>
        <TextInput lang={lang} value={data.fullName} onChange={(e) => setData({ ...data, fullName: e.target.value })} />
      </Field>
      <Field label={s.jobTitleLabel} tip={s.jobTitleTip} required>
        <TextInput lang={lang} value={data.jobTitle} onChange={(e) => setData({ ...data, jobTitle: e.target.value })} />
      </Field>
      <div className="grid grid-cols-2 gap-4">
        <Field label={s.phoneLabel} tip={s.phoneTip} required>
          <TextInput
            lang={lang}
            type="tel"
            inputMode="numeric"
            value={data.phone}
            onChange={(e) => setData({ ...data, phone: e.target.value.replace(/[^0-9]/g, "") })}
            dir="ltr"
          />
          {phoneTouched && !phoneOk && <p className="mt-1 text-xs text-red-600">{s.phoneError}</p>}
        </Field>
        <Field label={s.emailLabel} tip={s.emailTip} required>
          <TextInput lang={lang} type="email" value={data.email} onChange={(e) => setData({ ...data, email: e.target.value })} dir="ltr" />
        </Field>
      </div>
      <div className="grid grid-cols-2 gap-4">

function ResumePreview({ data, printRef, s, dir }) {
  const exps = data.experiences.filter((e) => e.title || e.company);

  const certifications = data.certifications.filter((c) => c.name);
  const projects = data.projects.filter((p) => p.name);

  return (
    <div
      ref={printRef}
      id="resume-print-area"
      className="bg-white text-black"
      dir={dir}
      style={{ fontFamily: "'Noto Sans Arabic', 'Arial', sans-serif" }}
    >
      <div className="max-w-[800px] mx-auto p-10">
        <div className="border-b-2 border-black pb-4 mb-6">
          <h1 className="text-3xl font-bold">{data.fullName || s.r_namePlaceholder}</h1>
          <p className="text-lg mt-1">{data.jobTitle || s.r_titlePlaceholder}</p>

            {data.phone && (
              <span>
                {s.r_phoneLabel}: <span dir="ltr">{data.phone}</span>
              </span>
            )}
            {data.email && (
              <span>
                {s.r_emailLabel}: <span dir="ltr">{data.email}</span>
              </span>
            )}
            {data.city && (
              <span>
                {s.r_cityLabel}: {data.city}
              </span>
            )}
            {data.linkedin && (
              <span dir="ltr">
                {s.r_linkedinLabel}:{" "}
                <a
                  href={/^https?:\/\//.test(data.linkedin) ? data.linkedin : `https://${data.linkedin}`}
                  className="underline"
                >
                  {data.linkedin}
                </a>
              </span>
            )}
          </div>
        </div>

        {data.summary && (
          <Section title={data.status === "graduate" ? s.r_summaryGraduate : s.r_summary}>
            <p className="text-sm leading-relaxed whitespace-pre-line">{data.summary}</p>
          </Section>
        )}

        {exps.length > 0 && (
          <Section title={s.r_experience}>
            {exps.map((exp) => (
              <div key={exp.id} className="mb-4">
                <div className="flex justify-between items-baseline">
                  <span className="font-bold text-sm">
                    {exp.title}
                    {exp.company ? ` — ${exp.company}` : ""}
                  </span>
                  <span className="text-xs text-neutral-600 whitespace-nowrap">
                    {exp.start}
                    {exp.start || exp.end || exp.current ? " - " : ""}
                    {exp.current ? s.currentLabel : exp.end}
                  </span>
                </div>
                {exp.bullets && (
                  <ul className="list-disc ms-5 mt-1 text-sm leading-relaxed">
                    {exp.bullets
                      .split("\n")
                      .filter(Boolean)
                      .map((b, idx) => (
                        <li key={idx}>{b.replace(/^-\s*/, "")}</li>

                <span className="text-sm">
                  <span className="font-bold">{ed.degree}</span>

              <div key={c.id} className="mb-2 flex justify-between items-baseline text-sm">

        type="button"
        onClick={() => setLang("ar")}

// ---------- Main App ----------

const STEP_KEYS = ["status", "contact", "summary", "experience", "education", "skills", "courses", "certifications", "projects", "achievements", "extra"];

function App() {
  const [lang, setLang] = useState("ar");
  const [data, setData] = useState(initialData());
  const [stepIndex, setStepIndex] = useState(0);
  const [showPreview, setShowPreview] = useState(false);
  const printRef = useRef(null);

  const s = STR[lang];
  const dir = s.dir;
  const step = STEP_KEYS[stepIndex];
  const isLast = stepIndex === STEP_KEYS.length - 1;

  const requiredOk = (st) => {
    if (st === "status") return !!data.status;
    if (st === "contact") return !!(data.fullName && data.jobTitle && data.email && isPhoneValid(data.phone));
    if (st === "summary") return !!data.summary;
    if (st === "skills") return !!data.skills;
    if (st === "extra") {
      if (!data.isBeneficiary || !data.referralSource) return false;
      if (data.referralSource === "other" && !data.referralOther) return false;
      return true;
    }
    return true;
  };

  const goNext = () => setStepIndex((i) => Math.min(i + 1, STEP_KEYS.length - 1));
  const goBack = () => setStepIndex((i) => Math.max(i - 1, 0));

  const handleNextClick = () => {
    if (step === "contact") {
      if (!data.fullName || !data.jobTitle || !data.email) {
        window.alert(s.fillRequiredAlert);
        return;
      }
      if (!isPhoneValid(data.phone)) {
        window.alert(s.phoneError);
        return;
      }
      goNext();
      return;
    }
    if (!requiredOk(step)) {
      window.alert(s.fillRequiredAlert);
      return;
    }
    if (isLast) {
      sendToSheet(data);
      setShowPreview(true);
    } else {
      goNext();
    }
  };

  if (showPreview) {
    return (
      <div className="min-h-screen bg-neutral-100 py-8 px-4" dir={dir}>
        <style>{`
          @media print {
            body * { visibility: hidden; }
            #resume-print-area, #resume-print-area * { visibility: visible; }
            #resume-print-area { position: absolute; top: 0; left: 0; width: 100%; }
            .no-print { display: none !important; }
            @page { margin: 12mm; }
          }
        `}</style>
        <div className="max-w-[900px] mx-auto">
          <div className="flex justify-between items-center mb-4 no-print">
            <button onClick={() => setShowPreview(false)} className="text-sm font-semibold text-neutral-700 hover:text-neutral-900">
              {s.backToEdit}
            </button>
            <button
              onClick={() => window.print()}
              className="bg-neutral-900 text-white text-sm font-semibold px-5 py-2.5 rounded-md hover:bg-neutral-700 transition"
            >
              {s.downloadPdf}
            </button>
          </div>
          <p className="text-xs text-neutral-500 mb-3 no-print">{s.printHint}</p>
          <div className="shadow-lg rounded-md overflow-hidden">
            <ResumePreview data={data} printRef={printRef} s={s} dir={dir} />
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-neutral-50" dir={dir} style={{ fontFamily: "'Noto Sans Arabic', 'Arial', sans-serif" }}>
      <div className="max-w-[640px] mx-auto px-4 py-8">
        <div className="flex justify-between items-start mb-6">
          <div>
            <h1 className="text-2xl font-bold text-neutral-900">{s.appTitle}</h1>
            <p className="text-sm text-neutral-500 mt-1">{s.appSubtitle}</p>
          </div>
          <LangSwitcher lang={lang} setLang={setLang} />
        </div>

        {data.status && (
          <div className="flex gap-1 mb-8">
            {STEP_KEYS.map((k, i) => (
              <div key={k} className={`h-1 flex-1 rounded-full ${i <= stepIndex ? "bg-neutral-900" : "bg-neutral-200"}`} />
            ))}
          </div>
        )}

        <div className="bg-white border border-neutral-200 rounded-xl p-6">
          {step === "status" && <StepStatus data={data} setData={setData} s={s} onNext={goNext} />}
          {step === "contact" && <StepContact data={data} setData={setData} s={s} lang={lang} />}
          {step === "summary" && <StepSummary data={data} setData={setData} s={s} lang={lang} />}
          {step === "experience" && <StepExperience data={data} setData={setData} s={s} lang={lang} />}
          {step === "education" && <StepEducation data={data} setData={setData} s={s} lang={lang} />}
          {step === "skills" && <StepSkills data={data} setData={setData} s={s} lang={lang} />}
          {step === "courses" && <StepCourses data={data} setData={setData} s={s} lang={lang} />}
          {step === "certifications" && <StepCertifications data={data} setData={setData} s={s} lang={lang} />}
          {step === "projects" && <StepProjects data={data} setData={setData} s={s} lang={lang} />}
          {step === "achievements" && <StepAchievements data={data} setData={setData} s={s} lang={lang} />}
          {step === "extra" && <StepExtra data={data} setData={setData} s={s} lang={lang} />}
        </div>

        {step !== "status" && (
          <div className="flex justify-between mt-6">
            <button onClick={goBack} className="text-sm font-semibold text-neutral-600 hover:text-neutral-900 px-3 py-2">
              {s.back}
            </button>
            <button
              onClick={handleNextClick}
              className="bg-neutral-900 text-white text-sm font-semibold px-6 py-2.5 rounded-md hover:bg-neutral-700 transition"
            >
              {isLast ? s.preview : s.next}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}
